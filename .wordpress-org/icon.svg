<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title>AI Valve plugin icon</title>
  <desc>A control valve with connected AI nodes, representing metered and permission-gated AI usage.</desc>
  <defs>
